const Wallet   = (p) => <Svg {...p}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></Svg>;
const Target   = (p) => <Svg {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Svg>;
const Flame    = (p) => <Svg {...p}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></Svg>;
const Plus     = (p) => <Svg {...p}><path d="M5 12h14"/><path d="M12 5v14"/></Svg>;

const Bag      = (p) => <Svg {...p}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></Svg>;
const Utensils = (p) => <Svg {...p}><path d="M3 2v7c0 1.1.9 2 2 2a2 2 0 0 0 2-2V2"/><path d="M5 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></Svg>;
const Car      = (p) => <Svg {...p}><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></Svg>;

/* ===== helpers ===== */
const money  = (n, dp = 2) => "$" + Number(Math.abs(n)).toLocaleString("en-US", { minimumFractionDigits: dp, maximumFractionDigits: dp });
const moneyW = (n) => "$" + Math.round(n).toLocaleString("en-US");
const clamp  = (v, a, b) => Math.min(b, Math.max(a, v));

function useCountUp(value, duration = 650) {
  const [d, setD] = useState(value);
  const from = useRef(value);
  useEffect(() => {
    const start = performance.now(), a = from.current, b = value;
    let raf;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const e = 1 - Math.pow(1 - t, 3);
      setD(a + (b - a) * e);
      if (t < 1) raf = requestAnimationFrame(tick); else from.current = b;
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return d;
}

/* ===== model ===== */
const INCOME = 3000, FIXED = 1200, BUFFER = 75, ESCROW = 0, DAYS_LEFT = 30;
const FIXED_ITEMS = [
  { label: "Rent", amt: 1150, icon: HomeI },
  { label: "Gym membership", amt: 39, icon: Repeat },
  { label: "Spotify", amt: 11, icon: Sparkles },
];
const dailyFromBite = (bite) => Math.max(0, (INCOME - FIXED - BUFFER - ESCROW - bite) / DAYS_LEFT);
const parseAmount = (t) => { const m = t.replace(/,/g, "").match(/\$?\s?(\d+(?:\.\d{1,2})?)/); return m ? parseFloat(m[1]) : null; };

/* ===== shared bits ===== */
const Mark = ({ size = 38 }) => (
  <div className="rounded-full grid place-items-center shrink-0 bg-neutral-900 text-white"
       style={{ width: size, height: size }}>
    <span className="serif" style={{ fontWeight: 700, fontSize: size * 0.5, lineHeight: 1 }}>M</span>
  </div>
);
const StatusBar = () => (
  <div className="flex items-center justify-between px-7 pt-3 pb-1 text-neutral-900 text-[13px] font-semibold tracking-tight z-20 relative">
    <span>9:41</span>
    <div className="flex items-center gap-1.5">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
      <div className="w-[22px] h-[11px] rounded-[3px] border border-neutral-900/70 p-[1.5px]"><div className="h-full w-[70%] bg-neutral-900 rounded-[1px]"/></div>
    </div>
  </div>
);
const Ring = ({ pct, warn }) => {
  const r = 82, c = 2 * Math.PI * r;
  const off = c * (1 - clamp(pct, 0, 1));
  return (
    <svg viewBox="0 0 200 200" className="absolute inset-0 w-full h-full -rotate-90">
      <circle cx="100" cy="100" r={r} stroke="#ededed" strokeWidth="10" fill="none"/>
      <circle cx="100" cy="100" r={r} stroke={warn ? "#a3a3a3" : "#0a0a0a"} strokeWidth="10" fill="none" strokeLinecap="round"
              strokeDasharray={c} strokeDashoffset={off} style={{ transition: "stroke-dashoffset .7s cubic-bezier(.2,.8,.2,1)" }}/>
    </svg>
  );
};
const Bubble = ({ children }) => (
  <div className="max-w-[88%] rounded-2xl rounded-tl-md bg-neutral-100 px-3.5 py-2.5 text-neutral-700 text-[13.5px] leading-snug">{children}</div>
);

/* ============================================================== */
/*  SCREEN 1 — Connect                                            */
/* ============================================================== */
function ScreenConnect({ onDone }) {
  const [phase, setPhase] = useState("idle");
  const [method, setMethod] = useState("bank");
  const [done, setDone] = useState(0);
  const steps = method === "bank"
    ? ["Linking your bank with Plaid…", "Pulling 90 days of transactions…", "Isolating fixed payroll lines…", "Identifying recurring subscriptions…", "Categorizing discretionary spend…"]
    : ["Reading statement rows…", "Isolating fixed payroll lines…", "Identifying recurring subscriptions…", "Categorizing discretionary spend…", "Encrypting & saving to your vault…"];
  useEffect(() => {
    if (phase !== "parsing") return;
    if (done >= steps.length) { const t = setTimeout(() => setPhase("done"), 420); return () => clearTimeout(t); }
    const t = setTimeout(() => setDone((d) => d + 1), done === 0 ? 460 : 620);
    return () => clearTimeout(t);
  }, [phase, done]);

  return (
    <div className="px-5 pt-2 pb-6 anim-fadeUp">
      <div className="flex items-center gap-3 mb-5">
        <Mark />
        <div>
          <div className="text-neutral-900 font-semibold text-[15px] flex items-center gap-1.5">Monium <span className="text-[10px] font-semibold px-1.5 py-0.5 rounded-full bg-neutral-900 text-white">BETA</span></div>
          <div className="text-neutral-500 text-xs flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-neutral-900"/>online</div>
        </div>
      </div>
      <div className="space-y-2.5 mb-5">
        <Bubble>Hey 👋 I'm Monium. Let's find your <b className="text-neutral-900">Safe-to-Spend</b> number.</Bubble>
        <Bubble>Link your bank with <b className="text-neutral-900">Plaid</b>, or upload a statement (PDF · CSV) — I'll parse it privately.</Bubble>
      </div>

      {phase === "idle" && (
        <div className="anim-fadeIn">
          <div className="flex gap-2 mb-3">
            {[["bank","Connect bank",Bank],["upload","Upload CSV",Upload]].map(([k,lbl,Ic]) => (
              <button key={k} onClick={() => setMethod(k)}
                className={`flex-1 rounded-xl border px-3 py-2.5 text-[13px] font-semibold flex items-center justify-center gap-2 transition ${method===k ? "border-neutral-900 bg-neutral-900 text-white" : "border-neutral-200 bg-white text-neutral-500"}`}>
                <Ic size={16}/> {lbl}
              </button>
            ))}
          </div>
          <button onClick={() => setPhase("parsing")}
            className={`group w-full rounded-2xl border bg-neutral-50 hover:bg-neutral-100 hover:border-neutral-400 transition-all p-6 text-center ${method==="upload" ? "border-dashed border-neutral-300" : "border-neutral-200"}`}>
            <div className="mx-auto mb-3 w-12 h-12 rounded-xl grid place-items-center bg-neutral-900 text-white group-hover:scale-105 transition">
              {method==="bank" ? <Bank size={22}/> : <Upload size={22}/>}
            </div>
            <div className="text-neutral-900 font-semibold text-[15px]">{method==="bank" ? "Connect with Plaid" : "Upload Bank Statement"}</div>
            <div className="text-neutral-400 text-xs mt-1">{method==="bank" ? "Bank-grade · read-only · 12,000+ banks" : "PDF · CSV — drop or browse"}</div>
          </button>
        </div>
      )}

      {phase !== "idle" && (
        <div className="rounded-2xl border border-neutral-200 bg-white p-4 anim-fadeIn shadow-[0_1px_2px_rgba(0,0,0,.04)]">
          <div className="flex items-center gap-2.5 mb-4">
            <div className="w-9 h-9 rounded-lg grid place-items-center bg-neutral-100 text-neutral-700">{method==="bank" ? <Bank size={18}/> : <FileText size={18} />}</div>
            <div className="min-w-0">
              <div className="text-neutral-900 text-sm font-medium truncate">{method==="bank" ? "Chase · ····4821" : "statement_june.csv"}</div>
              <div className="text-neutral-400 text-xs">{method==="bank" ? "Linked via Plaid · 92 transactions" : "248 KB · 92 transactions"}</div>
            </div>
            {phase === "done" && <Check className="ml-auto text-neutral-900" size={20} />}
          </div>
          <div className="space-y-2.5">
            {steps.map((s, i) => {
              const complete = i < done || phase === "done";
              const active = i === done && phase === "parsing";
              return (
                <div key={i} className={`flex items-center gap-3 text-[13px] transition-all duration-300 ${complete ? "text-neutral-800" : active ? "text-neutral-900" : "text-neutral-300"}`}>
                  <span className="w-4 h-4 grid place-items-center">
                    {complete ? <span className="text-neutral-900 anim-pop inline-flex"><Check size={15} sw={3}/></span>
                      : active ? <span className="w-3.5 h-3.5 rounded-full border-2 border-neutral-300 border-t-neutral-900 animate-spin"/>
                      : <span className="w-1.5 h-1.5 rounded-full bg-neutral-300"/>}
                  </span>{s}
                </div>
              );
            })}
          </div>
          {phase === "done" && (
            <button onClick={onDone}
              className="mt-5 w-full rounded-xl py-3 font-semibold text-white flex items-center justify-center gap-2 bg-neutral-900 hover:bg-neutral-800 transition anim-fadeUp">
              Review your money <ArrowR size={18} sw={2.5} />
            </button>
          )}

      )}
      <div className="flex items-center gap-2 mt-5 text-neutral-400 text-[11px] leading-relaxed">
        <Lock size={26} className="text-neutral-300 shrink-0" />
        <span>Read-only access via Plaid · we never see or store your bank login. Everything's encrypted with AES-256.</span>
      </div>
    </div>
  );
}

/* ============================================================== */
/*  SCREEN 2 — Review                                             */
/* ============================================================== */
function ScreenReview({ goals, onDone }) {
  const [grown, setGrown] = useState(false);
  useEffect(() => { const t = setTimeout(() => setGrown(true), 120); return () => clearTimeout(t); }, []);
  const goalBite = goals.filter(g => g.enrolled).reduce((s, g) => s + g.monthly, 0);
  const runway = INCOME - FIXED - BUFFER - goalBite;
  const seg = (v) => (grown ? (v / INCOME) * 100 : 0) + "%";
  return (
    <div className="px-5 pt-2 pb-6 anim-fadeUp">
      <div className="mb-1 text-neutral-400 text-[11px] font-bold tracking-[.16em] uppercase">Parsed · {moneyW(INCOME)} / mo</div>
      <h2 className="text-neutral-900 text-[26px] font-bold leading-tight tracking-tight mb-4 serif">Here's how I split<br/>your money.</h2>
      <div className="h-3.5 w-full rounded-full overflow-hidden flex bg-neutral-100 mb-2">
        <div className="h-full bg-neutral-900" style={{ width: seg(FIXED + BUFFER), transition: "width 1s cubic-bezier(.2,.8,.2,1)" }} />
        <div className="h-full bg-neutral-500" style={{ width: seg(goalBite), transition: "width 1s .1s cubic-bezier(.2,.8,.2,1)" }} />
        <div className="h-full bg-neutral-300" style={{ width: seg(runway), transition: "width 1s .2s cubic-bezier(.2,.8,.2,1)" }} />
      </div>
      <div className="flex justify-between text-[11px] text-neutral-500 mb-5">
        <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-neutral-900"/>Fixed</span>
        <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-neutral-500"/>Vaults</span>
        <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-neutral-300"/>Runway</span>
      </div>
      <Block icon={Lock} title="Fixed Liabilities" badge="Locked Out" amount={moneyW(FIXED + BUFFER)}>
        <div className="space-y-2 mt-3">
          {FIXED_ITEMS.map((f) => (
            <div key={f.label} className="flex items-center gap-2.5 text-[13px]">
              <f.icon size={15} className="text-neutral-400" /><span className="text-neutral-600">{f.label}</span>
              <span className="ml-auto text-neutral-500 tabular-nums">{moneyW(f.amt)}</span>
            </div>
          ))}
          <div className="flex items-center gap-2.5 text-[13px]"><Shield size={15} className="text-neutral-400"/><span className="text-neutral-600">Safety buffer</span><span className="ml-auto text-neutral-500 tabular-nums">{moneyW(BUFFER)}</span></div>
        </div>
      </Block>
      <Block icon={Wallet} title="Goal Vault Allocations" badge="Auto-hidden" amount={moneyW(goalBite)}>
        <div className="space-y-2 mt-3">
          {goals.filter(g=>g.enrolled).map((g) => (
            <div key={g.id} className="flex items-center gap-2.5 text-[13px]">
              <g.icon size={15} className="text-neutral-500" /><span className="text-neutral-600">{g.label}</span>
              <span className="ml-auto text-neutral-500 tabular-nums">{moneyW(g.monthly)}/mo</span>
            </div>
          ))}
        </div>
      </Block>
      <div className="rounded-2xl p-4 mb-5 border border-neutral-900 bg-neutral-900 text-white">
        <div className="flex items-center gap-2 text-white/60 text-[11px] font-bold tracking-[.14em] uppercase mb-1"><Sparkles size={14}/> Raw Liquid Runway</div>
        <div className="text-white text-[34px] font-extrabold tracking-tight tabular-nums">{moneyW(runway)}</div>
        <div className="text-white/55 text-[13px]">Fluid cash for the month — this powers your <b className="text-white">{money(runway / DAYS_LEFT)}/day</b> allowance.</div>
      </div>
      <button onClick={onDone}
        className="w-full rounded-xl py-3.5 font-semibold text-white flex items-center justify-center gap-2 bg-neutral-900 hover:bg-neutral-800 transition">
        Enter Monium <ArrowR size={18} sw={2.5} />
      </button>
    </div>
  );
}
function Block({ icon: I, title, badge, amount, children }) {
  return (
    <div className="rounded-2xl border border-neutral-200 bg-white p-4 mb-3 shadow-[0_1px_2px_rgba(0,0,0,.04)]">
      <div className="flex items-center gap-2.5">
        <div className="w-9 h-9 rounded-lg grid place-items-center bg-neutral-100 text-neutral-700"><I size={17} /></div>
        <div><div className="text-neutral-900 text-[14px] font-semibold leading-tight">{title}</div>
          <span className="text-[10px] font-semibold px-1.5 py-0.5 rounded bg-neutral-100 text-neutral-500">{badge}</span></div>
        <div className="ml-auto text-neutral-900 font-bold tabular-nums">{amount}</div>
      </div>{children}
    </div>
  );
}

/* ============================================================== */
/*  HOME — Safe-to-Spend dashboard                                */
/* ============================================================== */
function Dashboard({ daily, spent, streak, goalBite, txns }) {
  const [showCalc, setShowCalc] = useState(false);
  const remaining = daily - spent;
  const over = remaining < 0;
  const ratio = remaining / (daily || 1);
  const warn = !over && ratio < 0.25;
  const display = useCountUp(Math.abs(remaining));

  return (
    <div className="px-5 pt-2 pb-28 anim-fadeUp">
      <div className="flex items-center justify-between mb-4">
        <div><div className="text-neutral-400 text-[13px]">Good morning,</div>
          <div className="text-neutral-900 font-bold text-lg tracking-tight flex items-center gap-1.5 serif">Alex</div></div>
        <Mark size={36} />
      </div>

      <div className="relative grid place-items-center mt-1 mb-3">

/* ===== Error boundary ===== */
class EB extends React.Component {
  constructor(p) { super(p); this.state = { e: null }; }
  static getDerivedStateFromError(e) { return { e }; }
  render() {
    if (this.state.e) return <pre style={{ color: "#b91c1c", padding: 24, whiteSpace: "pre-wrap", font: "13px ui-monospace,monospace" }}>{String(this.state.e.stack || this.state.e)}</pre>;
    return this.props.children;
  }
}

  const [phase, setPhase] = useState("connect");

  const [streak] = useState(12);
  const [sheet, setSheet] = useState(false);
  const [betaOpen, setBetaOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [messages, setMessages] = useState([{ from: "bot", text: "Hey 👋 I'm Monium. Ask me if you can afford something, set a savings goal, or log a purchase — I'll update your numbers live." }]);
  const [typing, setTyping] = useState(false);

  const goalBite = goals.filter(g => g.enrolled).reduce((s, g) => s + g.monthly, 0);
  const daily = dailyFromBite(goalBite);
  const remaining = daily - spent;

  const flash = (m) => { setToast(m); setTimeout(() => setToast(null), 2400); };
  const reset = () => { setPhase("connect"); setTab("home"); setGoals(INITIAL_GOALS); setSpent(0); setTxns([]); setSheet(false); setMessages(messages.slice(0,1)); };

  const logTxn = (t) => { setSpent(s => s + t.amt); setTxns(x => [t, ...x]); flash((remaining - t.amt) < 0 ? `Logged ${money(t.amt)} · you're over today` : `Logged ${money(t.amt)} · Safe-to-Spend updated`); };
  const toggleGoal = (id) => setGoals(gs => gs.map(g => g.id === id ? { ...g, enrolled: !g.enrolled } : g));
  const addGoal = (g) => { setGoals(gs => [...gs, { ...g, id: Date.now() }]); flash(`Vault created · ${g.label}`); };

  const detectMonthsToDec = () => { const m = new Date().getMonth(); const d = (11 - m); return d > 0 ? d : 12; };
  const reply = (text) => setMessages(ms => [...ms, { from: "bot", text }]);

  const handleUser = (text) => {
    setMessages(ms => [...ms, { from: "user", text }]);
    setTyping(true);
    const lower = text.toLowerCase();
    const amt = parseAmount(text);
    setTimeout(() => {
      setTyping(false);
      if (/spent|paid|bought/.test(lower) && amt) {
        const label = /coffee/.test(lower) ? "Coffee" : /dinner|lunch|food|eat/.test(lower) ? "Dining" : /uber|ride|taxi/.test(lower) ? "Transport" : "Purchase";
        const icon = label === "Coffee" ? Coffee : label === "Dining" ? Utensils : Bag;
        logTxn({ label, amt, icon });
        const nr = remaining - amt;
        reply(nr < 0
          ? `Logged ${money(amt)} for ${label.toLowerCase()}. That tips you <b>${money(-nr)} over</b> today — your streak is now cooling down. Want to pull from a vault?`
          : `Logged ${money(amt)} for ${label.toLowerCase()}. ✅ You've got <b>${money(nr)}</b> left of today's ${money(daily)}.`);
      } else if (/(save|saving|goal|put away)/.test(lower) && amt) {
        const months = /dec/.test(lower) ? detectMonthsToDec() : (lower.match(/(\d+)\s*month/) ? parseInt(lower.match(/(\d+)\s*month/)[1]) : 12);
        const monthly = Math.round(amt / months);
        const label = /car/.test(lower) ? "Car Fund" : /house|home|down ?payment/.test(lower) ? "Home Fund" : /trip|travel|vacation|japan/.test(lower) ? "Trip Fund" : "New Goal";
        const icon = /car/.test(lower) ? Car : /trip|travel|vacation/.test(lower) ? Plane : Target;
        addGoal({ label, saved: 0, target: amt, monthly, enrolled: true, icon });
        const newDaily = dailyFromBite(goalBite + monthly);
        reply(`Done 🎯 I built <b>${label}</b> — tucking away <b>${moneyW(monthly)}/mo</b> for ${months} months to hit ${moneyW(amt)}.<br/><br/>That moves your Safe-to-Spend to <b>${money(newDaily)}/day</b>. ${monthly > 500 ? "That's aggressive — want me to stretch the timeline?" : "Check the Vaults tab to tweak it."}`);
      } else if (/(can i|afford|should i)/.test(lower) && amt) {
        const weeklyFlex = daily * 7 - spent;
        reply(amt <= weeklyFlex
          ? `✓ <b>Yes</b> — ${money(amt)} fits. It's inside this week's flex of about ${money(Math.max(0, weeklyFlex))}, and you'll keep your ${streak}-day streak. Want me to log it?`
          : `I'd hold off — ${money(amt)} is about <b>${(amt / daily).toFixed(1)}× your daily allowance</b> of ${money(daily)}. I can spread it over a few days or pull from a vault. Want a plan?`);
      } else if (/(safe.?to.?spend|calculat|how much|how do you|formula)/.test(lower)) {
        reply(`Your daily number = (income − fixed bills − buffer − goal vaults − escrow) ÷ days left.<br/><br/>Right now: ${moneyW(INCOME)} − ${moneyW(FIXED)} − ${moneyW(BUFFER)} − ${moneyW(goalBite)} = <b>${moneyW(INCOME-FIXED-BUFFER-goalBite)}</b>, ÷ ${DAYS_LEFT} days = <b>${money(daily)}/day</b>.`);
      } else {
        reply(`I can help you <b>check affordability</b>, <b>set a savings goal</b>, or <b>log a spend</b>. Try one of the chips below 👇`);
      }
    }, 950);
  };

  return (
    <div className={`w-full flex flex-col items-center ${EMBED ? "pt-20 pb-4" : "min-h-screen justify-start py-8 px-4"}`}>
      {CHROME && (
        <div className="w-full max-w-[430px] flex items-center justify-between mb-6 px-1">
          <div className="flex items-center gap-2 text-neutral-900 font-bold text-xl serif"><Mark size={28}/> Monium</div>
          <button onClick={() => setBetaOpen(true)} className="px-4 py-2 rounded-full bg-neutral-900 text-white text-[13px] font-semibold hover:bg-neutral-800 transition">Join Beta</button>
        </div>
      )}

      {CHROME && (
        <div className="flex items-center gap-1 p-1 rounded-full bg-white border border-neutral-200 mb-5 shadow-[0_1px_2px_rgba(0,0,0,.04)]">
          {STEPS.map(([k, lbl], i) => (
            <button key={k} onClick={() => setPhase(k)}
              className={`px-4 py-2 rounded-full text-[13px] font-semibold transition-all ${phase === k ? "bg-neutral-900 text-white" : "text-neutral-500 hover:text-neutral-900"}`}>
              <span className="opacity-50 mr-1">{i + 1}</span>{lbl}
            </button>
          ))}
        </div>
      )}

      <div className="relative w-[390px] max-w-full">
        <div className="relative rounded-[54px] bg-neutral-900 p-3 shadow-[0_40px_90px_-30px_rgba(0,0,0,.45)]">
          <div className="relative rounded-[44px] overflow-hidden bg-[#fbfbfb] h-[760px] flex flex-col">
            <div className="absolute top-2.5 left-1/2 -translate-x-1/2 w-28 h-7 bg-neutral-900 rounded-full z-30" />
            <StatusBar />

            <div className="flex-1 overflow-hidden relative flex flex-col">
              {phase === "connect" && <div className="flex-1 overflow-y-auto no-scroll"><ScreenConnect onDone={() => setPhase("review")} /></div>}
              {phase === "review" && <div className="flex-1 overflow-y-auto no-scroll"><ScreenReview goals={goals} onDone={() => { setPhase("app"); setTab("home"); }} /></div>}
              {phase === "app" && (
                <>
                  <div className="flex-1 overflow-y-auto no-scroll">
                    {tab === "home" && <Dashboard daily={daily} spent={spent} streak={streak} goalBite={goalBite} txns={txns} />}
                    {tab === "vaults" && <Vaults goals={goals} daily={daily} onToggle={toggleGoal} onAddGoal={() => setTab("chat")} />}
                    {tab === "chat" && <Chat messages={messages} typing={typing} onSend={handleUser} />}
                    {tab === "tips" && <Tips daily={daily} />}
                  </div>

                  {toast && (
                    <div className="absolute left-1/2 -translate-x-1/2 bottom-28 z-40 anim-fadeUp">
                      <div className="px-4 py-2.5 rounded-full bg-neutral-900 text-white text-[13px] font-semibold shadow-xl flex items-center gap-2"><Check size={15} sw={3} />{toast}</div>
                    </div>
                  )}
                  {tab === "home" && !sheet && (
                    <button onClick={() => setSheet(true)}
                      className="absolute right-5 bottom-24 z-30 w-14 h-14 rounded-full grid place-items-center text-white shadow-[0_12px_30px_-6px_rgba(0,0,0,.4)] bg-neutral-900 hover:scale-105 active:scale-95 transition"><Plus size={26} sw={2.5} /></button>
                  )}

                  <div className="absolute bottom-0 inset-x-0 z-20 px-6 pt-3 pb-6 bg-gradient-to-t from-[#fbfbfb] via-[#fbfbfb]/95 to-transparent">
                    <div className="flex items-center justify-between">
                      {[["home", HomeI], ["vaults", Wallet], ["chat", MessageC], ["tips", Bulb]].map(([k, Ic]) => (
                        <button key={k} onClick={() => setTab(k)} className={`flex flex-col items-center gap-1 transition ${tab === k ? "text-neutral-900" : "text-neutral-400 hover:text-neutral-600"}`}>
                          <Ic size={22} />
                          <span className={`w-1 h-1 rounded-full ${tab === k ? "bg-neutral-900" : "bg-transparent"}`} />
                        </button>
                      ))}
                    </div>
                  </div>

                  {sheet && <LogSheet onClose={() => setSheet(false)} onLog={(t) => { logTxn(t); setSheet(false); }} />}
                </>
              )}
            </div>
          </div>
        </div>
      </div>

      {CHROME && <button onClick={reset} className="mt-5 text-neutral-400 hover:text-neutral-700 text-[13px] font-medium transition">↺ Reset demo</button>}

      {betaOpen && <BetaModal onClose={() => setBetaOpen(false)} />}
    </div>
  );
}

const root = document.getElementById("root");
root.dataset.mounted = "1";
ReactDOM.createRoot(root).render(<EB><App /></EB>);
</script>
